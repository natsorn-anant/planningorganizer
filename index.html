        <!-- Main workspace showing Gantt Chart Timeline -->
        <div class="gantt-container">
            <!-- Navigation Control Bar -->
            <div class="gantt-controls">
                <div class="view-selector">
                    <button id="view-btn-weekly" class="active" onclick="changeView('weekly')">Weekly</button>
                    <button id="view-btn-monthly" onclick="changeView('monthly')">Monthly</button>
                    <button id="view-btn-yearly" onclick="changeView('yearly')">Yearly</button>
                </div>

                <div class="current-range-display" id="current-range-text">
                    Loading range...
                </div>

                <div class="navigation-controls">
                    <button onclick="navigateView(-1)">◀ Prev</button>
                    <button onclick="navigateView(0)" class="today-btn">Today</button>
                    <button onclick="navigateView(1)">Next ▶</button>
                </div>
            </div>

            <!-- Gantt view containing header & absolute grid -->
            <div id="gantt-view" style="display: flex; flex-direction: column; flex: 1;">
                <!-- Dynamic grid rows, bars, and undated section rendered here -->
            </div>
        </div>
    </div>

    <!-- Mouse hover tooltip -->
    <div id="gantt-tooltip"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
        import {
            getFirestore,
            collection,
            deleteDoc,
            doc,
            getDocs,
            onSnapshot,
            setDoc,
            writeBatch
        } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';
        import { firebaseConfig } from './firebase-config.js';

        // Default seed data aligning with user context dates (June 2026)
        const PIC_NAMES = ['Boomerang', 'Patnon', 'NoonPij'];
        const initialTasks = [
            { id: "1", name: "Scenario-based Industry Fin Model", priority: "high", start: "2026-06-09", end: "2026-06-11", progress: 50, noDates: false, project: "#AM-Best", pic: "Boomerang" },
            { id: "2", name: "test", priority: "medium", start: "2026-06-13", end: "2026-06-24", progress: 0, noDates: false, project: "", pic: "Boomerang" },
            { id: "3", name: "UI Design Phase", priority: "medium", start: "2026-06-01", end: "2026-06-08", progress: 85, noDates: false, project: "#AI-Big-Bang", pic: "Boomerang" },
            { id: "4", name: "Backend Architecture", priority: "high", start: "2026-06-05", end: "2026-06-20", progress: 100, noDates: false, project: "#AI-Big-Bang", pic: "Boomerang" },
            { id: "5", name: "App Deployment & Launch", priority: "low", start: "2026-06-25", end: "2026-07-10", progress: 0, noDates: false, project: "", pic: "Boomerang" },
            { id: "6", name: "Draft project guidelines & standard operating procedures", priority: "low", start: "", end: "", progress: 10, noDates: true, project: "#Core-Platform", pic: "Boomerang" }
        ];

        const TASK_DATA_URL = './gantt-tasks-backup.json';
        const TASK_DATA_FILENAME = 'gantt-tasks-backup.json';
        const TASKS_COLLECTION = 'tasks';

        // Firestore is the shared source of truth. JSON and localStorage are backups only.
        let tasks = [];
        let db = null;
        let unsubscribeTasks = null;
        let initialSnapshotHandled = false;
        let lastSync = localStorage.getItem('gantt_last_sync') || '';
        let showCompleted = localStorage.getItem('gantt_show_completed') !== 'false'; // State tracking for toggle behavior
        let activeProjectFilter = 'all'; // Global filtering project flag state
        let activePicFilter = 'all'; // Global PIC filter state

        // Active State of Range Viewports
        let currentView = 'weekly';
        let viewDate = new Date(); // Dynamic starting date (defaults to the actual client date dynamically)
        let undatedPriorityFilter = 'all'; // Active filter state for undated tasks
        let undatedCollapsed = localStorage.getItem('gantt_undated_collapsed') === 'true'; // State manager for the backlog/undated tasks collapse option

        // Toggle collapsible sections in the sidebar & persist in localStorage
        function toggleSection(elementId) {
            const section = document.getElementById(elementId);
            if (section) {
                section.classList.toggle('collapsed');
                localStorage.setItem(`gantt_collapsed_${elementId}`, section.classList.contains('collapsed'));
            }
        }

        // Toggle undated section collapse state on render loop
        function toggleUndatedCollapse() {
            undatedCollapsed = !undatedCollapsed;
            localStorage.setItem('gantt_undated_collapsed', undatedCollapsed);
            renderGantt();
        }

        // Toggle state of dates based on undated checkbox state
        function toggleDateInputs() {
            const noDates = document.getElementById('task-no-dates').checked;
            const startInput = document.getElementById('task-start');
            const endInput = document.getElementById('task-end');

            if (noDates) {
                startInput.disabled = true;
                endInput.disabled = true;
                startInput.required = false;
                endInput.required = false;
                startInput.value = '';
                endInput.value = '';
            } else {
                startInput.disabled = false;
                endInput.disabled = false;
                startInput.required = true;
                endInput.required = true;
            }
        }

        // Toggle visibility of completed tasks (100% progress)
        function toggleCompletedTasks(checked) {
            showCompleted = checked;
            localStorage.setItem('gantt_show_completed', checked);
            render();
        }

        // Save or update task
        function saveTask(event) {
            event.preventDefault();
            const id = document.getElementById('task-id').value;
            const name = document.getElementById('task-name').value;
            const priority = document.getElementById('task-priority').value;
            const pic = document.getElementById('task-pic').value;
            const noDates = document.getElementById('task-no-dates').checked;
            const start = noDates ? "" : document.getElementById('task-start').value;
            const end = noDates ? "" : document.getElementById('task-end').value;
            const progress = parseInt(document.getElementById('task-progress').value) || 0;

            // Format Custom Project Tag Standard (Keep Notes Hashtag style)
            let project = document.getElementById('task-project').value.trim();
            if (project) {
                if (!project.startsWith('#')) {
                    project = '#' + project;
                }
                project = project.replace(/\s+/g, '-'); // auto replace spaces with hyphens for standard Keep-style tags
            }

            if (!noDates && new Date(start) > new Date(end)) {
                alert("Start Date cannot be after End Date!");
                return;
            }

            let taskToSave = null;

            if (id) {
                // Update
                const index = tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    taskToSave = { id, name, priority, start, end, progress, noDates, project, pic };
                    tasks[index] = taskToSave;
                }
            } else {
                // Create
                taskToSave = {
                    id: Date.now().toString(),
                    name, priority, start, end, progress, noDates, project, pic
                };
                tasks.push(taskToSave);
            }

            saveToStorageAndRender();
            if (taskToSave) persistTask(taskToSave);
            clearForm();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            // Automatically open task creation form if collapsed when user goes to edit
            const createFormSection = document.getElementById('section-create');
            if (createFormSection && createFormSection.classList.contains('collapsed')) {
                createFormSection.classList.remove('collapsed');
                localStorage.setItem('gantt_collapsed_section-create', 'false');
            }

            document.getElementById('task-id').value = task.id;
            document.getElementById('task-name').value = task.name;
            document.getElementById('task-project').value = task.project || "";
            document.getElementById('task-pic').value = PIC_NAMES.includes(task.pic) ? task.pic : 'Boomerang';
            document.getElementById('task-priority').value = task.priority;
            document.getElementById('task-no-dates').checked = !!task.noDates;
            toggleDateInputs();

            if (!task.noDates) {
                document.getElementById('task-start').value = task.start || "";
                document.getElementById('task-end').value = task.end || "";
            }
            document.getElementById('task-progress').value = task.progress;

            document.getElementById('form-title').innerText = "Edit Task";
            document.getElementById('save-btn').innerText = "Update Task";
            document.getElementById('cancel-btn').style.display = 'block';
        }

        function deleteTask(id, event) {
            if (event) event.stopPropagation();
            if(confirm("Are you sure you want to delete this task?")) {
                tasks = tasks.filter(t => t.id !== id);
                saveToStorageAndRender();
                removeTask(id);
                clearForm();
            }
        }

        function clearForm() {
            document.getElementById('task-id').value = "";
            document.getElementById('task-form').reset();
            document.getElementById('task-no-dates').checked = false;
            toggleDateInputs();
            document.getElementById('form-title').innerText = "Create New Task";
            document.getElementById('save-btn').innerText = "Add Task";
            document.getElementById('cancel-btn').style.display = 'none';
        }

        function sortTasks(criterion) {
            if (criterion === 'priority') {
                const order = { high: 1, medium: 2, low: 3 };
                tasks.sort((a, b) => {
                    const aDone = a.progress === 100 ? 1 : 0;
                    const bDone = b.progress === 100 ? 1 : 0;
                    if (aDone !== bDone) return aDone - bDone; // Completed goes to the bottom
                    return order[a.priority] - order[b.priority]; // Active sorted by high -> medium -> low
                });
            }
            saveToStorageAndRender();
        }

        function resetData() {
            if(confirm("Reset planner to initial template data?")) {
                tasks = [...initialTasks];
                viewDate = new Date();
                currentView = 'weekly';
                undatedPriorityFilter = 'all'; // Reset undated filter back to default
                activeProjectFilter = 'all'; // Reset project filter back to default
                activePicFilter = 'all'; // Reset PIC filter back to default
                undatedCollapsed = false;
                localStorage.setItem('gantt_undated_collapsed', 'false');
                showCompleted = true;
                document.getElementById('show-completed-toggle').checked = true;
                localStorage.setItem('gantt_show_completed', 'true');
                document.getElementById('view-btn-weekly').click();

                // Reset sidebar collapses back to expanded default
                document.querySelectorAll('.sidebar-section').forEach(s => {
                    s.classList.remove('collapsed');
                    localStorage.setItem(`gantt_collapsed_${s.id}`, 'false');
                });

                // Clear backup sync time
                lastSync = '';
                localStorage.removeItem('gantt_last_sync');
                displayLastSync();

                saveToStorageAndRender();
                replaceAllTasks(tasks);
                clearForm();
            }
        }

        // Render immediately while Firestore distributes the change to every open device.
        function saveToStorageAndRender() {
            localStorage.setItem('gantt_tasks', JSON.stringify(tasks));
            render();
        }

        function taskForFirestore(task) {
            return {
                name: String(task.name || ''),
                priority: ['high', 'medium', 'low'].includes(task.priority) ? task.priority : 'medium',
                start: String(task.start || ''),
                end: String(task.end || ''),
                progress: Math.max(0, Math.min(100, Number(task.progress) || 0)),
                noDates: Boolean(task.noDates),
                project: String(task.project || ''),
                pic: PIC_NAMES.includes(task.pic) ? task.pic : 'Boomerang',
                updatedAt: new Date().toISOString()
            };
        }

        function taskFromFirestore(snapshot) {
            const data = snapshot.data();
            return {
                id: snapshot.id,
                name: String(data.name || ''),
                priority: ['high', 'medium', 'low'].includes(data.priority) ? data.priority : 'medium',
                start: String(data.start || ''),
                end: String(data.end || ''),
                progress: Math.max(0, Math.min(100, Number(data.progress) || 0)),
                noDates: Boolean(data.noDates),
                project: String(data.project || ''),
                pic: PIC_NAMES.includes(data.pic) ? data.pic : 'Boomerang'
            };
        }

        function validateTaskData(data) {
            if (!Array.isArray(data)) {
                throw new Error('Task data must be a list of tasks.');
            }

            data.forEach((task, index) => {
                if (!task || typeof task !== 'object' || !('name' in task) || !('priority' in task)) {
                    throw new Error(`Task ${index + 1} is missing required properties.`);
                }
            });

            return data.map(task => ({
                ...task,
                pic: PIC_NAMES.includes(task.pic) ? task.pic : 'Boomerang'
            }));
        }

        function firebaseIsConfigured() {
            return firebaseConfig
                && firebaseConfig.apiKey
                && firebaseConfig.projectId
                && !Object.values(firebaseConfig).some(value => String(value).includes('REPLACE_WITH'));
        }

        async function loadBackupTasks() {
            try {
                const response = await fetch(TASK_DATA_URL, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return validateTaskData(await response.json());
            } catch (err) {
                const cachedTasks = localStorage.getItem('gantt_tasks');
                return cachedTasks ? validateTaskData(JSON.parse(cachedTasks)) : [...initialTasks];
            }
        }

        async function persistTask(task) {
            if (!db) return showSyncStatus('⚠ Firebase is not configured; the change is only visible on this device.');
            try {
                await setDoc(doc(db, TASKS_COLLECTION, String(task.id)), taskForFirestore(task));
                updateLastSync();
            } catch (err) {
                console.error('Unable to save task:', err);
                showSyncStatus(`⚠ Could not save to Firestore: ${err.message}`);
            }
        }

        async function removeTask(id) {
            if (!db) return showSyncStatus('⚠ Firebase is not configured; the deletion is only visible on this device.');
            try {
                await deleteDoc(doc(db, TASKS_COLLECTION, String(id)));
                updateLastSync();
            } catch (err) {
                console.error('Unable to delete task:', err);
                showSyncStatus(`⚠ Could not delete from Firestore: ${err.message}`);
            }
        }

        async function replaceAllTasks(replacementTasks) {
            if (!db) return showSyncStatus('⚠ Firebase is not configured; imported/reset data is only visible on this device.');
            try {
                const existing = await getDocs(collection(db, TASKS_COLLECTION));
                const totalWrites = existing.size + replacementTasks.length;
                if (totalWrites > 500) {
                    throw new Error('This import is too large for a single batch (maximum 500 changes).');
                }

                const batch = writeBatch(db);
                existing.forEach(item => batch.delete(item.ref));
                replacementTasks.forEach(task => {
                    batch.set(doc(db, TASKS_COLLECTION, String(task.id)), taskForFirestore(task));
                });
                await batch.commit();
                updateLastSync();
                showSyncStatus(`✓ Shared task data updated for all users.`);
            } catch (err) {
                console.error('Unable to replace Firestore task data:', err);
                showSyncStatus(`⚠ Could not update Firestore: ${err.message}`);
            }
        }

        async function initializeSharedTasks() {
            tasks = await loadBackupTasks();
            render();

            if (!firebaseIsConfigured()) {
                showSyncStatus('⚠ Add your Firebase web configuration to firebase-config.js before deploying.');
                return;
            }

            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);

                unsubscribeTasks = onSnapshot(
                    collection(db, TASKS_COLLECTION),
                    async snapshot => {
                        if (snapshot.empty && !initialSnapshotHandled) {
                            initialSnapshotHandled = true;
                            await replaceAllTasks(tasks.length ? tasks : initialTasks);
                            return;
                        }

                        initialSnapshotHandled = true;
                        tasks = snapshot.docs.map(taskFromFirestore);
                        localStorage.setItem('gantt_tasks', JSON.stringify(tasks));
                        render();
                        updateLastSync();
                    },
                    err => {
                        console.error('Firestore realtime listener failed:', err);
                        showSyncStatus(`⚠ Realtime sync unavailable: ${err.message}`);
                    }
                );
                showSyncStatus('✓ Connected to shared Firebase task data.');
            } catch (err) {
                console.error('Firebase initialization failed:', err);
                showSyncStatus(`⚠ Firebase connection failed: ${err.message}`);
            }
        }

        // Keep track and display local date time when a Sync action occurs
        function updateLastSync() {
            const now = new Date().toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            lastSync = now;
            localStorage.setItem('gantt_last_sync', lastSync);
            displayLastSync();
        }

        function displayLastSync() {
            const lastSyncEl = document.getElementById('last-sync-display');
            if (lastSyncEl) {
                lastSyncEl.innerHTML = lastSync 
                    ? `⏱️ <strong>Last shared update:</strong> ${lastSync}` 
                    : `⏱️ <strong>Last shared update:</strong> Never`;
            }
        }

        // Export a portable copy of the current task-data file.
        function exportData() {
            try {
                const dataStr = JSON.stringify(tasks, null, 4);
                const dataBlob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
                const dataUrl = URL.createObjectURL(dataBlob);

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUrl);
                linkElement.setAttribute('download', TASK_DATA_FILENAME);
                linkElement.click();
                URL.revokeObjectURL(dataUrl);

                showSyncStatus(`📤 Exported ${TASK_DATA_FILENAME}.`);
            } catch (err) {
                console.error("Export failed: ", err);
                alert("Failed to export backup. Please try again.");
            }
        }

        // Import data from exported backup file
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedTasks = validateTaskData(JSON.parse(e.target.result));

                    if (confirm(`Are you sure you want to import ${importedTasks.length} tasks? This will overwrite your current chart.`)) {
                        tasks = importedTasks;
                        activeProjectFilter = 'all'; // reset filter on import
                        activePicFilter = 'all'; // reset PIC filter on import
                        saveToStorageAndRender();
                        replaceAllTasks(tasks);
                        clearForm();
                        showSyncStatus('📥 Import complete. Shared Firebase data is being updated.');
                    }
                } catch (err) {
                    alert("Failed to import. Please make sure you are uploading a valid Gantt backup JSON file.\nError: " + err.message);
                }
                document.getElementById('import-file').value = '';
            };
            reader.readAsText(file);
        }

        function showSyncStatus(message) {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerText = message;
            statusEl.style.display = 'block';
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 6000);
        }

        // View Controls Transitions
        function changeView(viewType) {
            currentView = viewType;
            document.querySelectorAll('.view-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-btn-${viewType}`).classList.add('active');
            render();
        }

        function navigateView(direction) {
            if (direction === 0) {
                viewDate = new Date(); // Returns to the actual client date dynamically
            } else {
                if (currentView === 'weekly') {
                    viewDate.setDate(viewDate.getDate() + direction * 7);
                } else if (currentView === 'monthly') {
                    viewDate.setMonth(viewDate.getMonth() + direction);
                } else if (currentView === 'yearly') {
                    viewDate.setFullYear(viewDate.getFullYear() + direction);
                }
            }
            render();
        }

        function getMonthDays(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        // Priority filter controller for backlog tasks
        function setUndatedFilter(value) {
            undatedPriorityFilter = value;
            renderGantt();
        }

        // Dynamic project dropdown & datalist suggestions update
        function updateProjectFilterDropdown() {
            const dropdown = document.getElementById('project-filter');
            if (!dropdown) return;

            // Extract all unique project tags
            const projects = [];
            tasks.forEach(t => {
                if (t.project && t.project.trim()) {
                    const proj = t.project.trim();
                    if (!projects.includes(proj)) {
                        projects.push(proj);
                    }
                }
            });
            projects.sort();

            // Reset selected filter value if it no longer exists
            if (activeProjectFilter !== 'all' && !projects.includes(activeProjectFilter)) {
                activeProjectFilter = 'all';
            }

            // Clean up and populate filter options
            dropdown.innerHTML = '<option value="all">All Projects</option>';
            projects.forEach(proj => {
                const opt = document.createElement('option');
                opt.value = proj;
                opt.innerText = proj;
                if (proj === activeProjectFilter) {
                    opt.selected = true;
                }
                dropdown.appendChild(opt);
            });

            // Clean up and populate autofill Suggestions Datalist
            const datalist = document.getElementById('project-suggestions');
            if (datalist) {
                datalist.innerHTML = '';
                projects.forEach(proj => {
                    const opt = document.createElement('option');
                    opt.value = proj;
                    datalist.appendChild(opt);
                });
            }
        }

        function changeProjectFilter(value) {
            activeProjectFilter = value;
            render();
        }

        function changePicFilter(value) {
            activePicFilter = value;
            render();
        }

        // Render application elements
        function render() {
            updateProjectFilterDropdown();
            const picDropdown = document.getElementById('pic-filter');
            if (picDropdown) picDropdown.value = activePicFilter;
            renderSidebar();
            renderGantt();
        }

        function renderSidebar() {
            const listContainer = document.getElementById('sidebar-task-list');
            listContainer.innerHTML = '';

            // Apply filters based on state (Show Completed & Project filter)
            let tasksToRender = showCompleted ? tasks : tasks.filter(t => t.progress < 100);
            if (activeProjectFilter !== 'all') {
                tasksToRender = tasksToRender.filter(t => t.project === activeProjectFilter);
            }
            if (activePicFilter !== 'all') {
                tasksToRender = tasksToRender.filter(t => t.pic === activePicFilter);
            }

            if (tasksToRender.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">No tasks available</div>';
                return;
            }

            // Standardize Sorting: ensure completed tasks are moved to the end, active ones ordered by priority
            const priorityOrder = { high: 1, medium: 2, low: 3 };
            const sortedSidebarTasks = [...tasksToRender].sort((a, b) => {
                const aDone = a.progress === 100 ? 1 : 0;
                const bDone = b.progress === 100 ? 1 : 0;
                if (aDone !== bDone) return aDone - bDone; // pushing 100% completed tasks to the bottom of the list
                return priorityOrder[a.priority] - priorityOrder[b.priority]; // within group, sort by high -> medium -> low
            });

            sortedSidebarTasks.forEach(task => {
                const isCompleted = task.progress === 100;
                const cardClass = `task-card ${isCompleted ? 'completed' : task.priority}`;
                const badgeClass = `priority-badge ${isCompleted ? 'completed' : task.priority}`;
                const badgeLabel = isCompleted ? 'completed' : task.priority;

                const card = document.createElement('div');
                card.className = cardClass;
                card.onclick = () => editTask(task.id);

                const dateDisplay = task.noDates 
                    ? `📅 <em>No dates scheduled (Backlog)</em>` 
                    : `📅 ${formatDate(task.start)} to ${formatDate(task.end)}`;

                card.innerHTML = `
                    <div class="task-card-header">
                        <div style="display: flex; flex-direction: column; gap: 4px; max-width: 80%;">
                            <div class="task-card-title">${escapeHTML(task.name)}</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                                ${task.project ? `<span class="project-tag">${escapeHTML(task.project)}</span>` : ''}
                                <span class="pic-tag">👤 ${escapeHTML(task.pic || 'Boomerang')}</span>
                            </div>
                        </div>
                        <span class="${badgeClass}">${badgeLabel}</span>
                    </div>
                    <div class="task-card-dates">
                        ${dateDisplay}
                    </div>
                    <div class="task-card-progress">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${task.progress}%; background: ${isCompleted ? 'var(--completed-color)' : 'var(--primary-color)'}"></div>
                        </div>
                        <span>${task.progress}%</span>
                    </div>
                    <div class="task-actions">
                        <button onclick="deleteTask('${task.id}', event)" style="color: var(--priority-high);">Delete</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function renderGantt() {
            const ganttView = document.getElementById('gantt-view');
            ganttView.innerHTML = '';

            // Apply filters based on state (Show Completed & Project filter)
            let tasksToRender = showCompleted ? tasks : tasks.filter(t => t.progress < 100);
            if (activeProjectFilter !== 'all') {
                tasksToRender = tasksToRender.filter(t => t.project === activeProjectFilter);
            }
            if (activePicFilter !== 'all') {
                tasksToRender = tasksToRender.filter(t => t.pic === activePicFilter);
            }

            // Compute precise range bounds depending on viewport select
            let viewStart, viewEnd;
            let year = viewDate.getFullYear();
            let month = viewDate.getMonth();

            if (currentView === 'weekly') {
                // Find starting Sunday of that week
                viewStart = new Date(viewDate);
                const dayIndex = viewStart.getDay();
                viewStart.setDate(viewStart.getDate() - dayIndex);
                viewStart.setHours(0,0,0,0);

                viewEnd = new Date(viewStart);
                viewEnd.setDate(viewEnd.getDate() + 7);
            } else if (currentView === 'monthly') {
                viewStart = new Date(year, month, 1, 0, 0, 0);
                viewEnd = new Date(year, month + 1, 1, 0, 0, 0); // 1st of next month
            } else if (currentView === 'yearly') {
                viewStart = new Date(year, 0, 1, 0, 0, 0);
                viewEnd = new Date(year + 1, 0, 1, 0, 0, 0);
            }

            // Separate tasks with dates from those without dates AND ensure they overlap with the current view
            const viewStartMs = viewStart.getTime();
            const viewEndMs = viewEnd.getTime();

            let datedTasks = tasksToRender.filter(t => {
                if (t.noDates) return false;
                const taskStart = new Date(t.start);
                const taskEnd = new Date(t.end);
                taskStart.setHours(0,0,0,0);
                taskEnd.setHours(23,59,59,999);
                return taskEnd.getTime() >= viewStartMs && taskStart.getTime() <= viewEndMs;
            });

            // Standardize Sorting for Dated Tasks: completed tasks pushed to the end, active ones by priority
            const priorityOrder = { high: 1, medium: 2, low: 3 };
            datedTasks.sort((a, b) => {
                const aDone = a.progress === 100 ? 1 : 0;
                const bDone = b.progress === 100 ? 1 : 0;
                if (aDone !== bDone) return aDone - bDone;
                return priorityOrder[a.priority] - priorityOrder[b.priority];
            });

            // 1) Undated/Backlog: Always sort tasks by priority (high --> medium --> low), then completed pushed to end
            let undatedTasks = tasksToRender
                .filter(t => t.noDates)
                .sort((a, b) => {
                    const aDone = a.progress === 100 ? 1 : 0;
                    const bDone = b.progress === 100 ? 1 : 0;
                    if (aDone !== bDone) return aDone - bDone;
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                });

            // 2) Undated/Backlog: Filter by active priority if requested
            if (undatedPriorityFilter !== 'all') {
                undatedTasks = undatedTasks.filter(t => t.priority === undatedPriorityFilter);
            }

            // Render current dates range text in header
            updateRangeHeader(viewStart, viewEnd);

            if (tasksToRender.length === 0) {
                ganttView.innerHTML = '<div class="empty-state"><h3>No tasks scheduled</h3><p>Add some tasks in the sidebar to visualize them here.</p></div>';
                return;
            }

            // Generate Columns Headers
            let headerHTML = `
                <div class="gantt-header-row">
                    <div class="gantt-header-task-column">Task Description</div>
                    <div class="gantt-timeline-header">
            `;

            let totalDays = Math.ceil((viewEnd - viewStart) / (1000 * 60 * 60 * 24));

            if (currentView === 'weekly') {
                for (let i = 0; i < 7; i++) {
                    const colDate = new Date(viewStart.getTime() + i * 24 * 60 * 60 * 1000);
                    const dayLabel = colDate.getDate();
                    const dayName = colDate.toLocaleDateString(undefined, { weekday: 'short' });
                    const monthLabel = colDate.toLocaleString('default', { month: 'short' });
                    const isWeekend = colDate.getDay() === 0 || colDate.getDay() === 6;

                    headerHTML += `
                        <div class="gantt-day-col ${isWeekend ? 'weekend' : ''}" style="flex: 1;">
                            <div style="font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted);">${dayName}</div>
                            <div class="text-bold" style="font-size: 0.85rem;">${monthLabel} ${dayLabel}</div>
                        </div>
                    `;
                }
            } else if (currentView === 'monthly') {
                const totalMonthDays = getMonthDays(year, month);
                const colDetails = [
                    { label: `Days 1–7`, flex: 7 },
                    { label: `Days 8–14`, flex: 7 },
                    { label: `Days 15–21`, flex: 7 },
                    { label: `Days 22–${totalMonthDays}`, flex: totalMonthDays - 21 }
                ];
                colDetails.forEach(col => {
                    headerHTML += `
                        <div class="gantt-day-col" style="flex: ${col.flex};">
                            <div class="text-bold" style="font-size: 0.85rem;">${col.label}</div>
                            <div style="font-size: 0.65rem; color: var(--text-muted);">${viewStart.toLocaleString('default', { month: 'short' })}</div>
                        </div>
                    `;
                });
            } else if (currentView === 'yearly') {
                for (let m = 0; m < 12; m++) {
                    const monthDays = getMonthDays(year, m);
                    const testDate = new Date(year, m, 1);
                    const monthLabel = testDate.toLocaleString('default', { month: 'short' });

                    headerHTML += `
                        <div class="gantt-day-col" style="flex: ${monthDays};">
                            <div class="text-bold" style="font-size: 0.85rem;">${monthLabel}</div>
                        </div>
                    `;
                }
            }

            headerHTML += `</div></div>`;
            ganttView.innerHTML += headerHTML;

            // Render Rows & absolute bars matching proportionally to visual boundaries for Dated Tasks
            if (datedTasks.length === 0) {
                ganttView.innerHTML += `
                    <div class="empty-state" style="height: 120px;">
                        <p style="font-size: 0.9rem; color: var(--text-muted);">No dated tasks scheduled for this view range.</p>
                    </div>
                `;
            } else {
                datedTasks.forEach(task => {
                    const isCompleted = task.progress === 100;
                    const taskStart = new Date(task.start);
                    const taskEnd = new Date(task.end);
                    taskStart.setHours(0,0,0,0);
                    taskEnd.setHours(23,59,59,999);

                    // Grid background cells matching visual headers exactly
                    let cellsHTML = '';
                    if (currentView === 'weekly') {
                        for (let i = 0; i < 7; i++) {
                            const colDate = new Date(viewStart.getTime() + i * 24 * 60 * 60 * 1000);
                            const isWeekend = colDate.getDay() === 0 || colDate.getDay() === 6;
                            cellsHTML += `<div class="gantt-cell ${isWeekend ? 'weekend' : ''}"></div>`;
                        }
                    } else if (currentView === 'monthly') {
                        const totalMonthDays = getMonthDays(year, month);
                        cellsHTML += `<div class="gantt-cell" style="flex: 7;"></div>`;
                        cellsHTML += `<div class="gantt-cell" style="flex: 7;"></div>`;
                        cellsHTML += `<div class="gantt-cell" style="flex: 7;"></div>`;
                        cellsHTML += `<div class="gantt-cell" style="flex: ${totalMonthDays - 21};"></div>`;
                    } else if (currentView === 'yearly') {
                        for (let m = 0; m < 12; m++) {
                            cellsHTML += `<div class="gantt-cell" style="flex: ${getMonthDays(year, m)};"></div>`;
                        }
                    }

                    // Mathematical percentage mapping
                    let barHTML = '';
                    const pos = getBarPosition(task, viewStart, viewEnd);

                    if (pos) {
                        // Check if the visual representation is narrow in current scope to auto-hide labels
                        const visibleStart = Math.max(taskStart.getTime(), viewStart.getTime());
                        const visibleEnd = Math.min(taskEnd.getTime(), viewEnd.getTime());
                        const visibleDays = (visibleEnd - visibleStart) / (1000 * 60 * 60 * 24);

                        let hideLabel = false;
                        if (currentView === 'weekly' && visibleDays < 1.2) hideLabel = true;
                        if (currentView === 'monthly' && visibleDays < 3.5) hideLabel = true;
                        if (currentView === 'yearly' && visibleDays < 35.0) hideLabel = true;

                        const overflowLeftClass = pos.overflowLeft ? 'overflow-left' : '';
                        const overflowRightClass = pos.overflowRight ? 'overflow-right' : '';
                        const hideLabelClass = hideLabel ? 'hide-label' : '';
                        const barClass = `gantt-bar ${isCompleted ? 'completed' : task.priority} ${overflowLeftClass} ${overflowRightClass} ${hideLabelClass}`;

                        barHTML = `
                            <div class="${barClass}" 
                                 style="left: ${pos.leftPercent}%; width: ${pos.widthPercent}%;"
                                 onmouseenter="showTooltip(event, '${task.id}')"
                                 onmousemove="moveTooltip(event)"
                                 onmouseleave="hideTooltip()"
                                 onclick="editTask('${task.id}')">
                                <div class="gantt-bar-progress" style="width: ${task.progress}%"></div>
                                <div class="gantt-bar-label">
                                    <span>${escapeHTML(task.name)}</span>
                                    <span style="opacity: 0.8;">${task.progress}%</span>
                                </div>
                            </div>
                        `;
                    }

                    const rowHTML = `
                        <div class="gantt-row">
                            <div class="gantt-task-meta">
                                <div class="gantt-meta-title" onclick="editTask('${task.id}')">
                                    <span>${escapeHTML(task.name)}</span>
                                    ${task.project ? `<span class="project-tag-gantt">${escapeHTML(task.project)}</span>` : ''}
                                    <span class="pic-tag">👤 ${escapeHTML(task.pic || 'Boomerang')}</span>
                                </div>
                                <div class="gantt-meta-progress-wrapper">
                                    <div class="gantt-meta-progress-bar">
                                        <div class="gantt-meta-progress-fill ${isCompleted ? 'completed' : task.priority}" style="width: ${task.progress}%"></div>
                                    </div>
                                    <span class="gantt-meta-progress-text">${task.progress}% done</span>
                                </div>
                            </div>
                            <div class="gantt-timeline-row">
                                ${cellsHTML}
                                ${barHTML}
                            </div>
                        </div>
                    `;
                    ganttView.innerHTML += rowHTML;
                });
            }

            // Render Separate Retractable Undated Tasks Section at the bottom of the Gantt Chart
            let undatedHTML = `
                <div class="undated-section ${undatedCollapsed ? 'collapsed' : ''}">
                    <div class="undated-section-header" onclick="toggleUndatedCollapse()" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; cursor: pointer; user-select: none; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            📂 Undated Tasks / Backlog List
                            <span class="badge">${undatedTasks.length}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px; font-size: 0.85rem; font-weight: normal; color: var(--text-color);">
                            <div style="display: flex; align-items: center; gap: 8px;" onclick="event.stopPropagation()">
                                <label for="undated-filter" style="font-weight: 600; color: #475569;">Filter Priority:</label>
                                <select id="undated-filter" onchange="setUndatedFilter(this.value)" style="padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); background: white; font-size: 0.8rem; cursor: pointer; outline: none;">
                                    <option value="all" ${undatedPriorityFilter === 'all' ? 'selected' : ''}>All Priorities</option>
                                    <option value="high" ${undatedPriorityFilter === 'high' ? 'selected' : ''}>High Only</option>
                                    <option value="medium" ${undatedPriorityFilter === 'medium' ? 'selected' : ''}>Medium Only</option>
                                    <option value="low" ${undatedPriorityFilter === 'low' ? 'selected' : ''}>Low Only</option>
                                </select>
                            </div>
                            <span style="font-size: 0.95rem; color: var(--text-muted); transition: transform 0.2s;" class="undated-arrow-indicator">${undatedCollapsed ? '▼' : '▲'}</span>
                        </div>
                    </div>
                    <div class="undated-content-wrapper" style="margin-top: 15px;">
            `;

            if (undatedTasks.length === 0) {
                undatedHTML += `
                    <div style="color: var(--text-muted); font-size: 0.85rem; padding: 20px; background: white; border: 1px dashed var(--border-color); border-radius: 8px; text-align: center;">
                        No undated tasks match this filter criteria. Tick the "No defined dates" checkbox when adding/editing a task to place it here.
                    </div>
                `;
            } else {
                undatedHTML += `<div class="undated-grid">`;
                undatedTasks.forEach(task => {
                    const isCompleted = task.progress === 100;
                    const cardClass = `undated-card ${isCompleted ? 'completed' : task.priority}`;
                    const badgeClass = `priority-badge ${isCompleted ? 'completed' : task.priority}`;
                    const badgeLabel = isCompleted ? 'completed' : task.priority;

                    undatedHTML += `
                        <div class="${cardClass}" onclick="editTask('${task.id}')">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;">
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <div style="font-weight: 600; font-size: 0.9rem; color: #1e293b; line-height: 1.3;">${escapeHTML(task.name)}</div>
                                    <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                                        ${task.project ? `<span class="project-tag-backlog">${escapeHTML(task.project)}</span>` : ''}
                                        <span class="pic-tag">👤 ${escapeHTML(task.pic || 'Boomerang')}</span>
                                    </div>
                                </div>
                                <span class="${badgeClass}">${badgeLabel}</span>
                            </div>
                            <div class="task-card-progress" style="margin-top: 5px;">
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: ${task.progress}%; background: ${isCompleted ? 'var(--completed-color)' : 'var(--primary-color)'};"></div>
                                </div>
                                <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted);">${task.progress}% done</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 5px; border-top: 1px solid #f1f5f9;">
                                <span style="font-size: 0.7rem; color: var(--text-muted); font-style: italic;">No dates scheduled</span>
                                <button onclick="deleteTask('${task.id}', event)" style="padding: 2px 6px; font-size: 0.7rem; border-color: transparent; color: var(--priority-high); background: transparent; cursor: pointer;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                undatedHTML += `</div>`;
            }
            undatedHTML += `</div></div>`;
            ganttView.innerHTML += undatedHTML;
        }

        // Calculate visual bar layout sizes
        function getBarPosition(task, viewStart, viewEnd) {
            const taskStart = new Date(task.start);
            const taskEnd = new Date(task.end);
            taskStart.setHours(0,0,0,0);
            taskEnd.setHours(23,59,59,999);

            const viewStartMs = viewStart.getTime();
            const viewEndMs = viewEnd.getTime();
            const viewDuration = viewEndMs - viewStartMs;

            if (taskEnd.getTime() < viewStartMs || taskStart.getTime() > viewEndMs) {
                return null; // Completely out of range
            }

            const drawStart = Math.max(taskStart.getTime(), viewStartMs);
            const drawEnd = Math.min(taskEnd.getTime(), viewEndMs);

            const leftPercent = ((drawStart - viewStartMs) / viewDuration) * 100;
            const widthPercent = ((drawEnd - drawStart) / viewDuration) * 100;

            const overflowLeft = taskStart.getTime() < viewStartMs;
            const overflowRight = taskEnd.getTime() > viewEndMs;

            return {
                leftPercent,
                widthPercent: Math.max(1.5, widthPercent), // Ensures a sliver is always rendered if present
                overflowLeft,
                overflowRight
            };
        }

        // Active range display helper
        function updateRangeHeader(viewStart, viewEnd) {
            const rangeText = document.getElementById('current-range-text');
            if (currentView === 'weekly') {
                const startStr = viewStart.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                const endOfWeek = new Date(viewEnd.getTime() - 1);
                const endStr = endOfWeek.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                rangeText.innerText = `Week of ${startStr} – ${endStr}`;
            } else if (currentView === 'monthly') {
                rangeText.innerText = viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
            } else if (currentView === 'yearly') {
                rangeText.innerText = `Year ${viewDate.getFullYear()}`;
            }
        }

        // Interactive hover tooltips handlers
        function showTooltip(event, taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const tooltip = document.getElementById('gantt-tooltip');
            const isCompleted = task.progress === 100;
            const badgeClass = `priority-badge ${isCompleted ? 'completed' : task.priority}`;
            const badgeLabel = isCompleted ? 'Completed' : (task.priority.charAt(0).toUpperCase() + task.priority.slice(1));
            const startStr = formatDate(task.start);
            const endStr = formatDate(task.end);

            tooltip.innerHTML = `
                <div style="font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; white-space: normal; line-height: 1.3; display: flex; flex-direction: column; gap: 4px;">
                    <span>${escapeHTML(task.name)}</span>
                    ${task.project ? `<span class="project-tag-tooltip" style="align-self: flex-start;">${escapeHTML(task.project)}</span>` : ''}
                    <span class="pic-tag-tooltip">👤 ${escapeHTML(task.pic || 'Boomerang')}</span>
                </div>
                <div style="display: flex; gap: 6px; align-items: center; margin-bottom: 10px;">
                    <span class="${badgeClass}">${badgeLabel}</span>
                    <span style="font-size: 0.75rem; color: #cbd5e1; font-weight: 500;">${startStr} – ${endStr}</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.72rem; font-weight:600;">
                        <span style="color: #94a3b8;">Completion:</span>
                        <span>${task.progress}% Done</span>
                    </div>
                    <div style="height: 6px; background: #475569; border-radius: 3px; overflow: hidden; width: 100%;">
                        <div style="height: 100%; width: ${task.progress}%; background: var(--completed-color);"></div>
                    </div>
                </div>
            `;

            tooltip.style.display = 'block';
            tooltip.style.opacity = '1';
            moveTooltip(event);
        }

        // Mousemove tooltip boundary check
        function moveTooltip(event) {
            const tooltip = document.getElementById('gantt-tooltip');
            const tooltipWidth = tooltip.offsetWidth;
            const tooltipHeight = tooltip.offsetHeight;

            let x = event.pageX + 15;
            let y = event.pageY + 15;

            if (x + tooltipWidth > window.innerWidth) {
                x = event.pageX - tooltipWidth - 15;
            }
            if (y + tooltipHeight > window.innerHeight) {
                y = event.pageY - tooltipHeight - 15;
            }

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            const tooltip = document.getElementById('gantt-tooltip');
            tooltip.style.display = 'none';
            tooltip.style.opacity = '0';
        }

        // Export active Gantt viewport as PNG image
        function exportToPNG() {
            const ganttTarget = document.getElementById('gantt-view');
            const btn = document.querySelector('button[onclick="exportToPNG()"]');
            const originalText = btn.innerHTML;

            btn.innerHTML = '⏳ Generating...';
            btn.disabled = true;

            // Generate crisp high-dpi screenshot mapping css styles accurately
            html2canvas(ganttTarget, {
                backgroundColor: '#ffffff',
                scale: 2, // 2x Retina upscale resolution
                useCORS: true,
                logging: false,
                height: ganttTarget.scrollHeight, // Capture full contents if scrolled
                windowHeight: ganttTarget.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Gantt_Chart_${currentView}_View.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error("Export failed: ", err);
                alert("Failed to export Gantt Chart image. Please try again.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        // Helper formatting date strings
        function formatDate(dateStr) {
            if (!dateStr) return "N/A";
            const d = new Date(dateStr);
            return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Helper escaping html text elements
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Initial state adjustments
        document.getElementById('show-completed-toggle').checked = showCompleted;
        displayLastSync();

        // Restore collapsible states from localStorage on startup
        ['section-data', 'section-create', 'section-list'].forEach(id => {
            const collapsed = localStorage.getItem(`gantt_collapsed_${id}`) === 'true';
            const section = document.getElementById(id);
            if (section && collapsed) {
                section.classList.add('collapsed');
            }
        });

        // Inline HTML event handlers need these functions on window when using ES modules.
        Object.assign(window, {
            changePicFilter,
            changeProjectFilter,
            changeView,
            clearForm,
            deleteTask,
            editTask,
            exportData,
            exportToPNG,
            hideTooltip,
            importData,
            moveTooltip,
            navigateView,
            resetData,
            saveTask,
            setUndatedFilter,
            showTooltip,
            sortTasks,
            toggleCompletedTasks,
            toggleDateInputs,
            toggleSection,
            toggleUndatedCollapse
        });

        initializeSharedTasks();
    </script>
</body>
</html>
